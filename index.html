<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRL 2026 Tipping Competition</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* =============================================
   CONFIGURATION - edit PLAYERS and SUPABASE below
   ============================================= */
:root {
  --bg-deep: #0a0c10;
  --bg-card: #111418;
  --bg-card2: #161a20;
  --accent: #f5a623;
  --accent2: #e8312a;
  --green: #22c55e;
  --red: #ef4444;
  --text: #e8eaf0;
  --text-muted: #7a8090;
  --border: #232830;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg-deep); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

/* LOGIN SCREEN */
#login-screen {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background-image: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(245,166,35,0.09) 0%, transparent 70%);
  padding: 20px;
}
.login-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  width: 100%; max-width: 400px;
  text-align: center;
}
.login-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 52px; line-height: 0.9; text-transform: uppercase; }
.login-title span { display: block; color: var(--accent); font-size: 68px; letter-spacing: -2px; }
.login-sub { font-size: 14px; color: var(--text-muted); margin: 12px 0 32px; }
.login-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; text-align: left; }
.login-field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
.login-field select, .login-field input {
  background: var(--bg-deep); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 12px 14px;
  font-family: 'Barlow', sans-serif; font-size: 15px;
  color: var(--text); outline: none; transition: border-color 0.2s;
  width: 100%;
}
.login-field select option { background: #1a1e26; }
.login-field input:focus, .login-field select:focus { border-color: var(--accent); }
.login-field input::placeholder { color: #3a4050; }
.btn-login {
  width: 100%; background: linear-gradient(135deg, var(--accent), #e8931a);
  color: #000; font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 20px; letter-spacing: 1px;
  text-transform: uppercase; border: none; border-radius: 8px;
  padding: 15px; cursor: pointer; margin-top: 8px; transition: all 0.18s;
}
.btn-login:hover { box-shadow: 0 6px 20px rgba(245,166,35,0.3); }
.login-error { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 20px; }

/* MAIN APP - hidden until login */
#app { display: none; }

/* HEADER */
header {
  text-align: center; padding: 36px 20px 24px;
  position: relative; overflow: hidden;
  border-bottom: 1px solid var(--border);
}
header::before {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 600px; height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
}
.header-top { display: flex; justify-content: space-between; align-items: flex-start; max-width: 860px; margin: 0 auto; }
.header-mid { flex: 1; text-align: center; }
.header-badge {
  display: inline-block; background: linear-gradient(135deg, var(--accent2), #b71c1c);
  color: #fff; font-family: 'Barlow Condensed', sans-serif; font-weight: 800;
  font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
  padding: 5px 14px; border-radius: 3px; margin-bottom: 10px;
}
header h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: clamp(34px, 7vw, 64px); line-height: 0.9; letter-spacing: -1px; text-transform: uppercase; }
header h1 span { display: block; color: var(--accent); font-size: clamp(44px, 9vw, 86px); letter-spacing: -2px; }
.player-badge {
  background: var(--bg-card2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; font-size: 13px;
  color: var(--text-muted); text-align: right; min-width: 120px;
}
.player-badge strong { display: block; color: var(--accent); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; }
.btn-logout {
  background: none; border: 1px solid var(--border); color: var(--text-muted);
  font-family: 'Barlow', sans-serif; font-size: 12px; padding: 5px 10px;
  border-radius: 5px; cursor: pointer; margin-top: 6px; transition: all 0.15s; display: block; width: 100%;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* ROUND NAV */
.round-nav-wrap {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,12,16,0.96); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 10px 16px;
}
.round-nav { display: flex; gap: 6px; overflow-x: auto; max-width: 1100px; margin: 0 auto; scrollbar-width: thin; scrollbar-color: var(--accent) transparent; padding-bottom: 4px; }
.round-nav::-webkit-scrollbar { height: 4px; }
.round-nav::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
.rn-btn {
  flex-shrink: 0; background: var(--bg-card2); border: 1px solid var(--border);
  color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 13px; padding: 6px 12px;
  border-radius: 5px; cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.rn-btn:hover { background: #1e2230; color: var(--text); border-color: #3a4050; }
.rn-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.rn-btn.has-pick { border-color: var(--green); color: var(--green); }
.rn-btn.has-pick.active { background: var(--green); color: #000; border-color: var(--green); }

/* MAIN */
main { max-width: 860px; margin: 0 auto; padding: 24px 16px 80px; }
.round-section { display: none; }
.round-section.active { display: block; }
.round-header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 8px; padding-bottom: 14px; border-bottom: 2px solid var(--border); }
.round-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 40px; color: var(--accent); line-height: 1; }
.round-dates { font-size: 13px; color: var(--text-muted); }

/* 5-ROUND RULE NOTICE */
.rule-notice {
  background: rgba(245,166,35,0.07); border: 1px solid rgba(245,166,35,0.25);
  border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--text-muted);
  margin-bottom: 14px; line-height: 1.5;
}
.rule-notice strong { color: var(--accent); }

/* ALREADY TIPPED BANNER */
.already-tipped-banner {
  background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.3);
  border-radius: 10px; padding: 14px 18px; margin-bottom: 16px;
  font-size: 14px; display: flex; align-items: center; gap: 10px;
}
.already-tipped-banner .tick { color: var(--green); font-size: 20px; }
.already-tipped-banner strong { color: var(--green); }

/* GAME CARD */
.games-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.game-card {
  background: var(--bg-card); border: 2px solid var(--border);
  border-radius: 10px; padding: 14px 18px; position: relative; overflow: hidden;
  transition: all 0.2s;
}
.game-card.clickable { cursor: pointer; }
.game-card.clickable:hover { border-color: #3a4050; background: var(--bg-card2); transform: translateY(-1px); }
.game-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--border); transition: background 0.2s; }
.game-card.selected { border-color: var(--accent); background: rgba(245,166,35,0.06); }
.game-card.selected::before { background: var(--accent); }
.game-card.locked { opacity: 0.45; cursor: not-allowed; }
.game-card.locked::before { background: var(--red); }
.game-meta { font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 10px; text-transform: uppercase; font-weight: 600; }
.game-teams { display: flex; align-items: center; gap: 12px; }
.team { flex: 1; display: flex; align-items: center; gap: 10px; }
.team.away { flex-direction: row-reverse; text-align: right; }
.team-logo { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 12px; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.08); }
.team-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 17px; line-height: 1.1; }
.team-nick { font-size: 11px; color: var(--text-muted); }
.locked-tag { font-size: 10px; color: var(--red); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
.vs-badge { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 14px; color: var(--text-muted); flex-shrink: 0; }
.pick-hint { font-size: 12px; color: var(--text-muted); text-align: center; margin-bottom: 10px; }

/* SUBMIT AREA */
.submit-area { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 22px; }
.submit-area h3 { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; margin-bottom: 14px; text-transform: uppercase; }
.pick-display { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding: 12px 16px; background: var(--bg-deep); border-radius: 8px; border: 1px solid var(--border); }
.pick-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
.pick-value { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); }
.btn-submit {
  width: 100%; background: linear-gradient(135deg, var(--accent), #e8931a);
  color: #000; font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 20px; letter-spacing: 1px; text-transform: uppercase;
  border: none; border-radius: 8px; padding: 15px;
  cursor: pointer; transition: all 0.18s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-submit:hover { box-shadow: 0 8px 24px rgba(245,166,35,0.3); }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
.save-status { font-size: 13px; color: var(--text-muted); text-align: center; margin-top: 10px; min-height: 20px; }
.save-status.ok { color: var(--green); }
.save-status.err { color: var(--red); }

/* PROGRESS */
.progress-wrap { max-width: 860px; margin: 0 auto 24px; padding: 0 16px; }
.progress-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
.progress-bg { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 4px; transition: width 0.4s; }

/* HISTORY PANEL */
.history-toggle {
  width: 100%; background: var(--bg-card2); border: 1px solid var(--border);
  color: var(--text-muted); font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 15px; letter-spacing: 1px; text-transform: uppercase;
  padding: 12px 18px; border-radius: 8px; cursor: pointer; transition: all 0.18s;
  display: flex; justify-content: space-between; align-items: center;
}
.history-toggle:hover { border-color: #3a4050; color: var(--text); }
.history-panel { display: none; background: var(--bg-card); border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; padding: 16px 20px; }
.history-panel.open { display: block; }
.history-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.history-row:last-child { border-bottom: none; }
.history-row .rnd { color: var(--text-muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
.history-row .pick-team { color: var(--accent); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; }
.history-row .matchup { font-size: 12px; color: var(--text-muted); }
.history-row .no-pick { color: #3a4050; font-size: 13px; font-style: italic; }

/* ROUND STATUS BANNERS */
.round-status-banner {
  border-radius: 8px; padding: 10px 16px; font-size: 13px;
  font-weight: 600; margin-bottom: 14px; letter-spacing: 0.3px;
}
.round-status-banner.completed {
  background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: #ef4444;
}
.round-status-banner.future {
  background: rgba(122,128,144,0.08); border: 1px solid rgba(122,128,144,0.2); color: var(--text-muted);
}

/* SIDE TICK - shows on the chosen team's side */
.side-tick {
  width: 22px; height: 22px;
  background: var(--accent); border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: #000; font-size: 13px; font-weight: 900;
  margin-left: 8px; flex-shrink: 0;
}
.team.away .side-tick { margin-left: 0; margin-right: 8px; }
#loading-overlay { position: fixed; inset: 0; background: var(--bg-deep); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 16px; }
#loading-overlay.hidden { display: none; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading-msg { font-size: 14px; color: var(--text-muted); }

@media (max-width: 540px) {
  .team-name { font-size: 14px; }
  .team-logo { width: 36px; height: 36px; font-size: 10px; }
  .game-card { padding: 12px 14px; }
  .login-box { padding: 28px 20px; }
}
</style>
</head>

</div>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="display:none">

    <div class="round-nav" id="roundNav"></div>

      <span>My Tips History</span>
      <span id="histArrow">v</span>
    </button>
    <div class="history-panel" id="historyPanel"></div>
  </div>
</div>

/* =============================================
   5-ROUND RULE: returns teams blocked for a given round index
   Looks at the 4 rounds immediately before (ri-4 to ri-1)
   ============================================= */
function getBlockedTeams(ri) {
  var blocked = {};
  var start = Math.max(0, ri - 4);
  for (var i = start; i < ri; i++) {
    var t = allTips[ROUNDS[i].num];
    if (t) blocked[t.tipped_team] = ROUNDS[i].num;
  }
  return blocked; // { teamName: roundNum }
}

function initDB() {

}

/* =============================================
   LOGIN / LOGOUT
   ============================================= */
function populateLoginSelect() {
  // Players now type their username - no dropdown needed
}

function doLogin() {
  var name = document.getElementById('login-name').value.trim();
  var pin = document.getElementById('login-pin').value.trim();
  var err = document.getElementById('login-error');
  err.textContent = '';
  if (!name) { err.textContent = 'Please enter your username.'; return; }
  if (!pin) { err.textContent = 'Please enter your PIN.'; return; }
  var player = null;
  for (var i = 0; i < PLAYERS.length; i++) {
    if (PLAYERS[i].name.toLowerCase() === name.toLowerCase() && PLAYERS[i].pin === pin) { player = PLAYERS[i]; break; }
  }
  if (!player) { err.textContent = 'Username or PIN not recognised. Try again.'; return; }
  if (player.locked) {
    sessionStorage.removeItem('nrl_player');
    err.textContent = 'Your tipping account is locked for this competition. Contact the admin.';
    return;
  }
  currentPlayer = player.name; // use exact casing from config
  sessionStorage.setItem('nrl_player', player.name);
  showApp();
}

function doLogout() {
  currentPlayer = null;
  allTips = {};
  pendingPick = {};
  sessionStorage.removeItem('nrl_player');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pin').value = '';
  document.getElementById('login-error').textContent = '';
}

async function showApp() {
  setLoading(true, 'Loading your tips...');
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('player-name-display').textContent = currentPlayer;
  await loadTips();
  buildNav();
  buildRounds();
  updateProgress();
  setLoading(false);
}

/* =============================================
   SUPABASE DATA
   ============================================= */
async function loadTips() {
  allTips = {};
  if (!db) return; // no DB configured yet
  try {
    var res = await db.from('tips').select('*').eq('player', currentPlayer);
    if (res.data) {
      for (var i = 0; i < res.data.length; i++) {
        allTips[res.data[i].round_num] = res.data[i];
      }
    }
  } catch(e) { console.warn('Load tips error', e); }
}

async function saveTip(roundNum, home, away, tipped) {
  if (!db) {
    allTips[roundNum] = { round_num: roundNum, home_team: home, away_team: away, tipped_team: tipped };
    return { ok: true, dbSkipped: true };
  }
  try {
    var res = await db.from('tips').upsert({
      player: currentPlayer,
      round_num: roundNum,
      home_team: home,
      away_team: away,
      tipped_team: tipped
    }, { onConflict: 'player,round_num' });
    if (res.error) {
      console.error('Supabase error:', res.error);
      return { ok: false, msg: res.error.message + ' (code: ' + res.error.code + ')' };
    }
    allTips[roundNum] = { round_num: roundNum, home_team: home, away_team: away, tipped_team: tipped };
    return { ok: true };
  } catch(e) {
    console.error('saveTip exception:', e);
    return { ok: false, msg: e.message };
  }
}

/* =============================================
   BUILD UI
   ============================================= */
function buildNav() {
  var nav = document.getElementById('roundNav');
  nav.innerHTML = '';
  for (var i = 0; i < ROUNDS.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'rn-btn' + (i === 0 ? ' active' : '');
    btn.id = 'rnbtn-' + i;
    btn.textContent = 'Rd ' + ROUNDS[i].num;
    btn.onclick = (function(idx){ return function(){ switchRound(idx); }; })(i);
    nav.appendChild(btn);
  }
  refreshNavBadges();
}

function refreshNavBadges() {
  for (var i = 0; i < ROUNDS.length; i++) {
    var btn = document.getElementById('rnbtn-' + i);
    if (!btn) continue;
    var hasTip = !!allTips[ROUNDS[i].num];
    var hasPending = !!(pendingPick[i] && !allTips[ROUNDS[i].num]);
    btn.classList.toggle('has-pick', hasTip || hasPending);
  }
}

function buildRounds() {
  var main = document.getElementById('mainContent');
  main.innerHTML = '';
  for (var ri = 0; ri < ROUNDS.length; ri++) {
    (function(roundIdx) {
      var r = ROUNDS[roundIdx];
      var sec = document.createElement('section');
      sec.className = 'round-section' + (roundIdx === 0 ? ' active' : '');
      sec.id = 'round-' + roundIdx;
      main.appendChild(sec);
      renderRound(roundIdx);
    })(ri);
  }
}

function renderRound(ri) {
  var r = ROUNDS[ri];
  var sec = document.getElementById('round-' + ri);
  var existing = allTips[r.num];
  var blocked = getBlockedTeams(ri);
  var blockedNames = Object.keys(blocked);

  // Determine round status
  var isCompleted = r.num < CURRENT_ROUND;
  var isCurrent   = r.num === CURRENT_ROUND;
  var isFuture    = r.num > CURRENT_ROUND;

  var byeStr = '';
  if (r.byes && r.byes.length > 0) {
    var bn = [];
    for (var b = 0; b < r.byes.length; b++) bn.push(sn(r.byes[b]));
    byeStr = ' | Bye: ' + bn.join(', ');
  }

  // Status banner
  var statusHtml = '';
  if (isCompleted) {
    statusHtml = '<div class="round-status-banner completed">Round ' + r.num + ' has been completed - tipping is closed.</div>';
  } else if (isFuture) {
    statusHtml = '<div class="round-status-banner future">Tipping for Round ' + r.num + ' is not open yet.</div>';
  }

  var ruleHtml = '';
  if (isCurrent && blockedNames.length > 0) {
    var bTeams = [];
    for (var k = 0; k < blockedNames.length; k++) {
      bTeams.push(sn(blockedNames[k]) + ' (Rd ' + blocked[blockedNames[k]] + ')');
    }
    ruleHtml = '<div class="rule-notice"><strong>5-Round Rule:</strong> You cannot tip these teams again yet: ' + bTeams.join(', ') + '</div>';
  }

  var alreadyHtml = '';
  if (existing && isCurrent) {
    alreadyHtml = '<div class="already-tipped-banner"><span class="tick">&#10003;</span><div>Already tipped: <strong>' + sn(existing.tipped_team) + '</strong> to beat ' + sn(existing.home_team === existing.tipped_team ? existing.away_team : existing.home_team) + '. Change your tip below if needed.</div></div>';
  }

  // Submit area - only shown for current round
  var submitHtml = '';
  if (isCurrent) {
    submitHtml =
      '<p class="pick-hint">Click the HOME team (left) or AWAY team (right) to select your tip</p>' +
      '<div class="submit-area" id="submit-' + ri + '">' +
        '<h3>Submit Round ' + r.num + ' Tip</h3>' +
        '<div class="pick-display">' +
          '<span class="pick-label">Your Pick:</span>' +
          '<span class="pick-value" id="pickval-' + ri + '">' + (existing ? sn(existing.tipped_team) + ' to win' : 'No pick yet') + '</span>' +
        '</div>' +
        '<button class="btn-submit" id="submitbtn-' + ri + '" onclick="handleSubmit(' + ri + ')" ' + (existing || pendingPick[ri] ? '' : 'disabled') + '>Save &amp; WhatsApp</button>' +
        '<div class="save-status" id="savestatus-' + ri + '"></div>' +
      '</div>';
  }

  sec.innerHTML =
    '<div class="round-header">' +
      '<div class="round-num">Round ' + r.num + '</div>' +
      '<div class="round-dates">' + r.dates + byeStr + '</div>' +
    '</div>' +
    statusHtml + ruleHtml + alreadyHtml +
    '<div class="games-grid" id="games-' + ri + '"></div>' +
    submitHtml;

  // Build game cards
  for (var gi = 0; gi < r.games.length; gi++) {
    (function(roundIdx, gameIdx) {
      var g = ROUNDS[roundIdx].games[gameIdx];
      var tip = allTips[ROUNDS[roundIdx].num];
      var homeBlocked = !!blocked[g.home];
      var awayBlocked = !!blocked[g.away];
      var bothBlocked = homeBlocked && awayBlocked;

      // Work out which team is selected for THIS card
      var pendP = pendingPick[roundIdx];
      var tippedTeam = null;
      if (pendP && (pendP.team === g.home || pendP.team === g.away)) {
        tippedTeam = pendP.team;
      } else if (tip && (tip.tipped_team === g.home || tip.tipped_team === g.away)) {
        tippedTeam = tip.tipped_team;
      }
      var isSelected = !!tippedTeam;
      var homeSelected = tippedTeam === g.home;
      var awaySelected = tippedTeam === g.away;

      // Round is interactive only if current and not both-blocked
      var canClick = isCurrent && !bothBlocked && !isCompleted && !isFuture;

      var card = document.createElement('div');
      var cardClass = 'game-card';
      if (isCompleted || isFuture) cardClass += ' locked';
      else if (bothBlocked) cardClass += ' locked';
      else if (canClick) cardClass += ' clickable';
      if (isSelected) cardClass += ' selected';
      card.className = cardClass;
      card.id = 'game-' + roundIdx + '-' + gameIdx;

      var homeLocked = (homeBlocked && isCurrent) ? '<div class="locked-tag">blocked</div>' : '';
      var awayLocked = (awayBlocked && isCurrent) ? '<div class="locked-tag">blocked</div>' : '';

      // Tick on the correct side: home-tick or away-tick
      var homeTick = homeSelected ? '<div class="side-tick">&#10003;</div>' : '';
      var awayTick = awaySelected ? '<div class="side-tick">&#10003;</div>' : '';

      card.innerHTML =
        '<div class="game-meta">' + g.time + (g.venue ? ' | ' + g.venue : '') + '</div>' +
        '<div class="game-teams">' +
          '<div class="team home">' + logo(g.home) + '<div><div class="team-name">' + sn(g.home) + '</div>' + homeLocked + '</div>' + homeTick + '</div>' +
          '<div class="vs-badge">VS</div>' +
          '<div class="team away">' + logo(g.away) + '<div><div class="team-name">' + sn(g.away) + '</div>' + awayLocked + '</div>' + awayTick + '</div>' +
        '</div>';

      if (canClick) {
        card.addEventListener('click', function(e) {
          var rect = card.getBoundingClientRect();
          var mid = rect.left + rect.width / 2;
          var clickedTeam = (e.clientX < mid) ? g.home : g.away;
          if (e.clientX < mid && homeBlocked) clickedTeam = g.away;
          if (e.clientX >= mid && awayBlocked) clickedTeam = g.home;
          if (blocked[clickedTeam]) return;
          selectPick(roundIdx, gameIdx, clickedTeam, g.home, g.away);
        });
      }

      document.getElementById('games-' + roundIdx).appendChild(card);
    })(ri, gi);
  }
}

function selectPick(ri, gi, team, home, away) {
  pendingPick[ri] = { team: team, home: home, away: away, gameIdx: gi };
  // Re-render the whole round so ticks appear on the correct side
  renderRound(ri);
  var pv = document.getElementById('pickval-' + ri);
  if (pv) pv.textContent = sn(team) + ' to win';
  var btn = document.getElementById('submitbtn-' + ri);
  if (btn) btn.disabled = false;
  var navBtn = document.getElementById('rnbtn-' + ri);
  if (navBtn) navBtn.classList.add('has-pick');
}

async function handleSubmit(ri) {
  var p = pendingPick[ri];
  var existing = allTips[ROUNDS[ri].num];
  if (!p && !existing) return;
  var team = p ? p.team : existing.tipped_team;
  var home = p ? p.home : existing.home_team;
  var away = p ? p.away : existing.away_team;

  var btn = document.getElementById('submitbtn-' + ri);
  var status = document.getElementById('savestatus-' + ri);
  if (btn) btn.disabled = true;
  if (status) { status.className = 'save-status'; status.textContent = 'Saving...'; }

  // Always send WhatsApp FIRST so tip is never lost regardless of DB
  sendWhatsApp(ri, home, away, team);

  var res = await saveTip(ROUNDS[ri].num, home, away, team);

  if (res.ok) {
    if (status) {
      status.className = 'save-status ok';
      status.textContent = res.dbSkipped ? 'WhatsApp sent! (tip stored this session only - fix DB config to make permanent)' : 'Saved to database + WhatsApp sent!';
    }
    updateProgress();
    refreshNavBadges();
    renderRound(ri);
    for (var j = ri + 1; j <= Math.min(ri + 4, ROUNDS.length - 1); j++) renderRound(j);
    renderHistory();
  } else {
    // DB failed - store in memory so the page still works this session
    allTips[ROUNDS[ri].num] = { round_num: ROUNDS[ri].num, home_team: home, away_team: away, tipped_team: team };
    if (status) {
      status.className = 'save-status err';
      status.textContent = 'WhatsApp sent! But DB save failed: ' + (res.msg || 'Unknown error') + ' - open F12 console for details';
    }
    if (btn) btn.disabled = true;
    updateProgress();
    refreshNavBadges();
    renderRound(ri);
    for (var j = ri + 1; j <= Math.min(ri + 4, ROUNDS.length - 1); j++) renderRound(j);
  }
}

function sendWhatsApp(ri, home, away, team) {
  var r = ROUNDS[ri];
  var msg = 'NRL 2026 Tipping\nPlayer: ' + currentPlayer + '\nRound ' + r.num + ' (' + r.dates + ')\nGame: ' + sn(home) + ' vs ' + sn(away) + '\nTip: ' + sn(team) + ' to win!';
  window.open('https://wa.me/' + WA_NUMBER + '?text=' + encodeURIComponent(msg), '_blank');
}

function switchRound(i) {
  document.querySelectorAll('.round-section').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.rn-btn').forEach(function(b) { b.classList.remove('active'); });
  var sec = document.getElementById('round-' + i);
  if (sec) sec.classList.add('active');
  var btn = document.getElementById('rnbtn-' + i);
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' }); }
  activeRound = i;
}

function updateProgress() {
  var count = Object.keys(allTips).length;
  var total = ROUNDS.length;
  var pct = Math.round((count / total) * 100);
  var pt = document.getElementById('progress-text');
  var pp = document.getElementById('progress-pct');
  var pf = document.getElementById('progress-fill');
  var pc = document.getElementById('player-picks-count');
  if (pt) pt.textContent = count + ' of ' + total + ' rounds tipped';
  if (pp) pp.textContent = pct + '%';
  if (pf) pf.style.width = pct + '%';
  if (pc) pc.textContent = count + '/' + total + ' tipped';
}

function toggleHistory() {
  var panel = document.getElementById('historyPanel');
  var arrow = document.getElementById('histArrow');
  panel.classList.toggle('open');
  if (arrow) arrow.textContent = panel.classList.contains('open') ? '^' : 'v';
  if (panel.classList.contains('open')) renderHistory();
}

function renderHistory() {
  var panel = document.getElementById('historyPanel');
  if (!panel) return;
  var html = '';
  for (var i = 0; i < ROUNDS.length; i++) {
    var r = ROUNDS[i];
    var t = allTips[r.num];
    if (t) {
      var opp = t.home_team === t.tipped_team ? t.away_team : t.home_team;
      html += '<div class="history-row">' +
        '<span class="rnd">Rd ' + r.num + ' <span class="matchup">' + r.dates + '</span></span>' +
        '<span class="pick-team">&#10003; ' + sn(t.tipped_team) + '</span>' +
        '<span class="matchup">vs ' + sn(opp) + '</span>' +
      '</div>';
    } else {
      html += '<div class="history-row"><span class="rnd">Rd ' + r.num + '</span><span class="no-pick">No tip yet</span></div>';
    }
  }
  panel.innerHTML = html;
}

function setLoading(on, msg) {
  var ov = document.getElementById('loading-overlay');
  var lm = document.getElementById('loading-msg');
  if (ov) ov.classList.toggle('hidden', !on);
  if (lm && msg) lm.textContent = msg;
}

/* INIT */
(function init() {
  db = initDB();
  populateLoginSelect();

  // Restore session - but only if player exists AND is not locked
  var savedPlayer = sessionStorage.getItem('nrl_player');
  if (savedPlayer) {
    for (var i = 0; i < PLAYERS.length; i++) {
      if (PLAYERS[i].name === savedPlayer) {
        if (PLAYERS[i].locked) {
          // Player has been locked since last login - clear session and show login
          sessionStorage.removeItem('nrl_player');
          break;
        }
        currentPlayer = savedPlayer;
        showApp();
        return;
      }
    }
  }
  setLoading(false);
  document.getElementById('login-screen').style.display = 'flex';
})();
</script>
